resources:
  jobs:
    approvalmax_cdc_automation_cluster:
      name: approvalmax_cdc_automation_cluster_${bundle.target}

      job_clusters:
        - job_cluster_key: approvalmax_demo_cluster
          new_cluster:
            spark_version: 15.4.x-scala2.12
            node_type_id: i3.xlarge
            num_workers: 1

      tasks:
        - task_key: load_cdc_to_bronze
          job_cluster_key: approvalmax_demo_cluster
          spark_python_task:
            python_file: ../src/databricks_ai/load_cdc_to_bronze.py

        - task_key: build_silver_stage
          depends_on:
            - task_key: load_cdc_to_bronze
          job_cluster_key: approvalmax_demo_cluster
          spark_python_task:
            python_file: ../src/databricks_ai/build_silver_stage.py

        - task_key: build_data_vault
          depends_on:
            - task_key: build_silver_stage
          job_cluster_key: approvalmax_demo_cluster
          spark_python_task:
            python_file: ../src/databricks_ai/build_data_vault.py

        - task_key: build_gold_mart
          depends_on:
            - task_key: build_data_vault
          job_cluster_key: approvalmax_demo_cluster
          spark_python_task:
            python_file: ../src/databricks_ai/build_gold_mart.py

        - task_key: run_quality_checks
          depends_on:
            - task_key: build_gold_mart
          job_cluster_key: approvalmax_demo_cluster
          spark_python_task:
            python_file: ../src/databricks_ai/run_quality_checks.py
