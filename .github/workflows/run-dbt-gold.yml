name: Run dbt Gold Models

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - Run ApprovalMax CDC Automation
    types:
      - completed
  push:
    branches:
      - main
    paths:
      - "models/**"
      - "dbt_project.yml"
      - "packages.yml"
      - "profiles.yml.example"
      - ".github/workflows/run-dbt-gold.yml"

permissions:
  contents: read

jobs:
  run-dbt-gold:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      DBT_PROFILES_DIR: .

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Python and dbt
        run: |
          python -m pip install --upgrade pip
          pip install dbt-core dbt-databricks sqlfluff

      - name: Prepare dbt profile
        run: |
          cp profiles.yml.example profiles.yml

      - name: Install dbt packages
        run: |
          dbt deps --profiles-dir .

      - name: dbt debug
        run: |
          dbt debug --profiles-dir .

      - name: dbt parse
        run: |
          dbt parse --profiles-dir .

      - name: dbt compile
        run: |
          dbt compile --profiles-dir .

      - name: Run dbt Gold model
        run: |
          dbt run --select fact_approval_document_lifecycle_dbt --profiles-dir .

      - name: Test dbt Gold model
        run: |
          dbt test --select fact_approval_document_lifecycle_dbt --profiles-dir .
