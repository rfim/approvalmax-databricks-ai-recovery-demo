name: Codex Auto-Fix on Failure

on:
  workflow_run:
    workflows:
      - Run Databricks Bundle Job
      - Databricks Bundle CI
      - Run ApprovalMax CDC Automation
      - Run ApprovalMax Great Expectations
    types:
      - completed

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  codex-auto-fix:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      FAILED_RUN_ID: ${{ github.event.workflow_run.id }}
      FAILED_RUN_URL: ${{ github.event.workflow_run.html_url }}
      FAILED_WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
      FAILED_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}

    steps:
      - name: Checkout failing commit
        uses: actions/checkout@v4
        with:
          ref: ${{ env.FAILED_HEAD_SHA }}
          fetch-depth: 0

      - name: Install GitHub CLI and jq
        run: |
          sudo apt-get update
          sudo apt-get install -y gh jq

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Codex CLI
        run: |
          npm install -g @openai/codex
          codex --version

      - name: Restore Codex auth.json
        run: |
          mkdir -p "$HOME/.codex"
          printf '%s' "$CODEX_AUTH_JSON" > "$HOME/.codex/auth.json"
          chmod 600 "$HOME/.codex/auth.json"
          cat > "$HOME/.codex/config.toml" <<'EOF'
          cli_auth_credentials_store = "file"
          EOF
        env:
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}

      - name: Download failed workflow logs
        run: |
          mkdir -p recovery
          gh run view "$FAILED_RUN_ID" --log > recovery/failed_workflow.log || true
          tail -n 160 recovery/failed_workflow.log || true

      - name: Create brief actionable failure context
        run: |
          python - <<'PY'
          from pathlib import Path
          import json

          log = Path("recovery/failed_workflow.log").read_text(errors="ignore")
          lower = log.lower()
          failed_workflow_name = "${{ env.FAILED_WORKFLOW_NAME }}"

          candidate_files = []
          for path in Path(".").rglob("*"):
              if ".git" in path.parts or "recovery" in path.parts:
                  continue
              if path.suffix not in [".py", ".ipynb", ".sql", ".yml", ".yaml", ".md"]:
                  continue
              try:
                  text = path.read_text(errors="ignore")
              except Exception:
                  continue
              if (
                  "USE SCHEMA" in text
                  or "great_expectations" in text.lower()
                  or "approvalmax_great_expectations" in str(path)
                  or "approval_cycle_time" in text
                  or "document_status" in text
              ):
                  candidate_files.append(str(path))

          if "great expectations validation failed" in lower or "great_expectations_results" in lower or "expect_" in lower:
              failure_type = "great_expectations_failure"
              context = {
                  "failure_type": failure_type,
                  "severity": "high",
                  "failed_workflow_name": failed_workflow_name,
                  "specific_error": "Great Expectations or SQL expectation validation failed.",
                  "root_cause": "One or more expectations failed on the Gold lifecycle mart, or the GE validation notebook has an implementation issue.",
                  "candidate_files_to_patch": candidate_files,
                  "valid_pr_must_change": [
                      "src/approvalmax_great_expectations_notebook.ipynb",
                      "docs/recovery/*.md"
                  ],
                  "invalid_pr_if_only_changes": [
                      "recovery/failure_context.json",
                      "recovery/failed_workflow.log"
                  ],
                  "allowed_actions": [
                      "add better diagnostic query",
                      "add quarantine/reporting logic",
                      "fix the expectation implementation if it is wrong",
                      "do not weaken critical expectations without human approval"
                  ],
                  "validation_commands": [
                      "databricks bundle validate -t dev",
                      "databricks bundle deploy -t dev",
                      "databricks bundle run approvalmax_great_expectations_serverless -t dev"
                  ]
              }
          elif "schema_not_found" in lower or ("schema" in lower and "cannot be found" in lower):
              context = {
                  "failure_type": "missing_schema",
                  "severity": "medium",
                  "failed_workflow_name": failed_workflow_name,
                  "specific_error": "SCHEMA_NOT_FOUND",
                  "root_cause": "The Databricks job runs USE SCHEMA before ensuring the schema exists.",
                  "candidate_files_to_patch": candidate_files,
                  "required_fix": {
                      "insert_before": "spark.sql(f\\\"USE SCHEMA {schema}\\\")",
                      "insert_line": "spark.sql(f\\\"CREATE SCHEMA IF NOT EXISTS {catalog}.{schema}\\\")"
                  },
                  "valid_pr_must_change": [
                      "src/*.ipynb",
                      "src/**/*.py",
                      "docs/recovery/*.md"
                  ],
                  "invalid_pr_if_only_changes": [
                      "recovery/failure_context.json",
                      "recovery/failed_workflow.log"
                  ],
                  "validation_commands": [
                      "databricks bundle validate -t dev",
                      "databricks bundle deploy -t dev"
                  ]
              }
          elif "uv: command not found" in lower:
              context = {
                  "failure_type": "missing_tool_uv",
                  "severity": "low",
                  "failed_workflow_name": failed_workflow_name,
                  "specific_error": "uv command is missing in GitHub Actions runner.",
                  "root_cause": "The bundle build uses uv, but the workflow did not install uv.",
                  "candidate_files_to_patch": [".github/workflows/*.yml"],
                  "required_fix": {"add_step": "Install uv before databricks bundle validate/deploy/build"},
                  "valid_pr_must_change": [".github/workflows/*.yml", "docs/recovery/*.md"],
                  "invalid_pr_if_only_changes": ["recovery/failure_context.json", "recovery/failed_workflow.log"]
              }
          elif "cannot configure default credentials" in lower or "default auth" in lower:
              context = {
                  "failure_type": "databricks_auth_failure",
                  "severity": "high",
                  "failed_workflow_name": failed_workflow_name,
                  "specific_error": "Databricks CLI cannot configure credentials.",
                  "root_cause": "The GitHub Actions workflow may not be passing DATABRICKS_HOST and DATABRICKS_TOKEN correctly.",
                  "candidate_files_to_patch": [".github/workflows/*.yml"],
                  "valid_pr_must_change": [".github/workflows/*.yml", "docs/recovery/*.md"],
                  "invalid_pr_if_only_changes": ["recovery/failure_context.json", "recovery/failed_workflow.log"]
              }
          else:
              context = {
                  "failure_type": "unknown_failure",
                  "severity": "medium",
                  "failed_workflow_name": failed_workflow_name,
                  "specific_error": "Unknown failure. See recovery/failed_workflow.log.",
                  "root_cause": "Requires human investigation.",
                  "candidate_files_to_patch": candidate_files,
                  "valid_pr_must_change": ["docs/recovery/*.md"],
                  "invalid_pr_if_only_changes": ["recovery/failure_context.json"]
              }

          context["failed_run_url"] = "${{ env.FAILED_RUN_URL }}"
          context["instruction"] = "Use AGENTS.md and skills/approvalmax-semi-self-recovery/SKILL.md. Keep the patch minimal and safe."
          context["log_tail"] = log[-12000:]

          Path("recovery/failure_context.json").write_text(json.dumps(context, indent=2))
          print(json.dumps({k: v for k, v in context.items() if k != "log_tail"}, indent=2))
          PY

      - name: Run Codex recovery
        continue-on-error: true
        run: |
          codex exec --sandbox workspace-write "
          Follow AGENTS.md strictly.

          Read:
          - recovery/failed_workflow.log
          - recovery/failure_context.json
          - skills/approvalmax-semi-self-recovery/SKILL.md
          - databricks.yml
          - resources/*.yml
          - src/
          - .github/workflows/

          Use recovery/failure_context.json as the source of truth.

          Create the smallest safe patch for the detected failure.

          Important:
          - Do not create a PR that only modifies recovery/failure_context.json or recovery/failed_workflow.log.
          - If the failure is unknown_failure, only then create a diagnostic note under docs/recovery/.

          If failure_type is great_expectations_failure:
          - Inspect src/approvalmax_great_expectations_notebook.ipynb.
          - Inspect the failed expectation names in recovery/failed_workflow.log.
          - If the expectation implementation is wrong, fix it.
          - If data is genuinely bad, add better diagnostic output or quarantine/reporting logic.
          - Do not weaken or remove critical expectations without explicit human review.
          - Add a recovery note under docs/recovery/.

          If failure_type is missing_schema:
          - Patch the file containing spark.sql(f\"USE SCHEMA {schema}\").
          - Add CREATE SCHEMA IF NOT EXISTS before USE SCHEMA.
          - Preserve existing catalog and schema variables.

          If failure_type is missing_tool_uv:
          - Add Install uv step to the relevant workflow.

          If failure_type is databricks_auth_failure:
          - Fix workflow env usage if needed.
          - Never print secrets.

          Do not auto-merge.
          Do not disable tests.
          Do not change secrets.
          Do not print secrets.
          Do not touch unrelated files.
          "

      - name: Deterministic fallback for known workflow fixes
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          import subprocess

          context = json.loads(Path("recovery/failure_context.json").read_text())
          failure_type = context.get("failure_type")

          changed = subprocess.run(
              ["git", "diff", "--name-only"],
              capture_output=True,
              text=True,
              check=True
          ).stdout.strip().splitlines()

          meaningful = [f for f in changed if not f.startswith("recovery/")]
          if meaningful:
              print("Codex already produced meaningful changes:", meaningful)
              raise SystemExit(0)

          Path("docs/recovery").mkdir(parents=True, exist_ok=True)

          if failure_type == "great_expectations_failure":
              note = Path("docs/recovery/great_expectations_failure.md")
              note.write_text(
                  "# Great Expectations Failure\\n\\n"
                  "## Root cause hypothesis\\n\\n"
                  "The Great Expectations validation workflow failed. This may be caused by invalid Gold data, a broken expectation implementation, or missing prerequisite tables.\\n\\n"
                  "## Recovery guidance\\n\\n"
                  "- Check `workspace.engineer_support_monitoring.great_expectations_results`.\\n"
                  "- Review the failed expectation names and row counts.\\n"
                  "- Do not weaken critical expectations without human approval.\\n"
                  "- If data is invalid, fix upstream CDC/Silver/Gold logic.\\n"
                  "- If the expectation implementation is wrong, update `src/approvalmax_great_expectations_notebook.ipynb`.\\n\\n"
                  "## Validation\\n\\n"
                  "```bash\\n"
                  "databricks bundle run approvalmax_great_expectations_serverless -t dev\\n"
                  "```\\n",
                  encoding="utf-8"
              )
              print("Created deterministic GE diagnostic note.")
          else:
              print("No deterministic fallback for failure_type:", failure_type)
          PY

      - name: Show generated diff
        run: |
          git status
          git diff

      - name: Validate recovery PR is meaningful
        run: |
          changed_files="$(git diff --name-only)"
          echo "$changed_files"

          if [ -z "$changed_files" ]; then
            echo "No changes were produced."
            exit 1
          fi

          meaningful_files="$(echo "$changed_files" | grep -v '^recovery/' || true)"

          if [ -z "$meaningful_files" ]; then
            echo "Only recovery files changed. This is not a meaningful recovery PR."
            exit 1
          fi

      - name: Create pull request with Codex or fallback fix
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "fix: recovery patch for failed workflow"
          branch: codex/auto-fix-${{ github.run_id }}
          base: main
          title: "[AI-DRAFT] Recovery patch for failed Databricks workflow"
          body: |
            This draft PR was created after a failed Databricks workflow.

            Failed workflow:
            ${{ env.FAILED_RUN_URL }}

            Workflow name:
            ${{ env.FAILED_WORKFLOW_NAME }}

            Human review checklist:
            - [ ] Patch is minimal
            - [ ] No tests or expectations were disabled
            - [ ] No secrets were changed
            - [ ] No secrets were printed
            - [ ] No unrelated files were touched
            - [ ] Databricks bundle validation passes
            - [ ] The failed workflow passes after merge
          labels: |
            ai-draft
            data-recovery
