name: Codex Auto-Fix on Failure

on:
  workflow_run:
    workflows:
      - Run Databricks Bundle Job
      - Databricks Bundle CI
    types:
      - completed

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  codex-auto-fix:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      FAILED_RUN_ID: ${{ github.event.workflow_run.id }}
      FAILED_RUN_URL: ${{ github.event.workflow_run.html_url }}
      FAILED_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}

    steps:
      - name: Checkout failing commit
        uses: actions/checkout@v4
        with:
          ref: ${{ env.FAILED_HEAD_SHA }}
          fetch-depth: 0

      - name: Install GitHub CLI and jq
        run: |
          sudo apt-get update
          sudo apt-get install -y gh jq

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Codex CLI
        run: |
          npm install -g @openai/codex
          codex --version

      - name: Check Codex auth secret presence
        run: |
          test -n "$CODEX_AUTH_JSON" && echo "CODEX_AUTH_JSON is set"
        env:
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}

      - name: Restore Codex auth.json
        run: |
          mkdir -p "$HOME/.codex"
          printf '%s' "$CODEX_AUTH_JSON" > "$HOME/.codex/auth.json"
          chmod 600 "$HOME/.codex/auth.json"
          cat > "$HOME/.codex/config.toml" <<'EOF'
          cli_auth_credentials_store = "file"
          EOF
        env:
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}

      - name: Download failed workflow logs
        run: |
          mkdir -p recovery
          gh run view "$FAILED_RUN_ID" --log > recovery/failed_workflow.log || true
          tail -n 160 recovery/failed_workflow.log || true

      - name: Create improved failure context
        run: |
          python - <<'PY'
          from pathlib import Path
          import json

          log = Path("recovery/failed_workflow.log").read_text(errors="ignore")
          lower = log.lower()

          if "schema_not_found" in lower or ("schema" in lower and "cannot be found" in lower):
              failure_type = "missing_schema"
          elif "uv: command not found" in lower:
              failure_type = "missing_tool_uv"
          elif "cannot configure default credentials" in lower or "default auth" in lower:
              failure_type = "databricks_auth_failure"
          elif "bundle validate" in lower or ("deploying resources" in lower and "error" in lower):
              failure_type = "bundle_resource_failure"
          elif "cannot cast" in lower or "type mismatch" in lower:
              failure_type = "schema_type_change"
          elif "duplicate" in lower or "unique" in lower:
              failure_type = "duplicate_or_grain_failure"
          elif "not_null" in lower or "null value" in lower:
              failure_type = "missing_required_value"
          elif "approval_cycle_time" in lower or "negative" in lower:
              failure_type = "invalid_business_metric"
          else:
              failure_type = "unknown_failure"

          # Capture useful error excerpt around SCHEMA_NOT_FOUND instead of only the tail stacktrace.
          marker = "SCHEMA_NOT_FOUND"
          idx = log.find(marker)
          if idx >= 0:
              start = max(0, idx - 3000)
              end = min(len(log), idx + 5000)
              error_excerpt = log[start:end]
          else:
              error_excerpt = log[-12000:]

          # Find likely files to patch.
          candidate_files = []
          for pattern in ["*.py", "*.ipynb", "*.sql", "*.yml", "*.yaml"]:
              for path in Path(".").rglob(pattern):
                  if ".git" in path.parts:
                      continue
                  if "recovery" in path.parts:
                      continue
                  try:
                      text = path.read_text(errors="ignore")
                  except Exception:
                      continue
                  if (
                      "USE SCHEMA" in text
                      or "USE CATALOG" in text
                      or 'dbutils.widgets.get("schema")' in text
                      or "dbutils.widgets.get('schema')" in text
                  ):
                      candidate_files.append(str(path))

          context = {
              "failed_run_url": "${{ env.FAILED_RUN_URL }}",
              "failure_type": failure_type,
              "error_excerpt": error_excerpt,
              "candidate_files_to_inspect": candidate_files,
              "expected_fix_for_missing_schema": {
                  "insert_before": "spark.sql(f\"USE SCHEMA {schema}\")",
                  "insert_line": "spark.sql(f\"CREATE SCHEMA IF NOT EXISTS {catalog}.{schema}\")"
              },
              "instruction": "Use AGENTS.md and skills/approvalmax-semi-self-recovery/SKILL.md. Keep the patch minimal and safe.",
              "log_tail": log[-20000:]
          }

          Path("recovery/failure_context.json").write_text(json.dumps(context, indent=2))
          print(json.dumps({
              "failure_type": failure_type,
              "candidate_files_to_inspect": candidate_files,
              "failed_run_url": "${{ env.FAILED_RUN_URL }}"
          }, indent=2))
          PY

      - name: Run Codex recovery
        run: |
          codex exec --sandbox workspace-write "
          Follow AGENTS.md strictly.

          Read these files first:
          - recovery/failed_workflow.log
          - recovery/failure_context.json
          - skills/approvalmax-semi-self-recovery/SKILL.md
          - databricks.yml
          - resources/*.yml
          - src/
          - .github/workflows/

          Use recovery/failure_context.json as the source of truth for:
          - failure_type
          - error_excerpt
          - candidate_files_to_inspect
          - expected_fix_for_missing_schema

          Create the smallest safe patch for the detected failure.

          For failure_type = missing_schema:
          - Inspect every file listed in candidate_files_to_inspect.
          - Find the file that contains USE SCHEMA or dbutils.widgets.get(\"schema\").
          - Add this line before USE SCHEMA:
            spark.sql(f\"CREATE SCHEMA IF NOT EXISTS {catalog}.{schema}\")
          - Preserve existing catalog and schema variables.
          - Do not hardcode workspace.engineer_support directly if catalog/schema variables already exist.
          - Add a recovery note under docs/recovery/.
          - The final logic should be:
            spark.sql(f\"USE CATALOG {catalog}\")
            spark.sql(f\"CREATE SCHEMA IF NOT EXISTS {catalog}.{schema}\")
            spark.sql(f\"USE SCHEMA {schema}\")

          If failure_type is missing_tool_uv:
          - Add Install uv step to the relevant workflow.

          If failure_type is databricks_auth_failure:
          - Fix workflow env usage if needed.
          - Never print secrets.

          If failure_type is bundle_resource_failure:
          - Fix databricks.yml or resources/*.yml minimally.

          If failure_type is schema_type_change:
          - Add safe cast, quarantine logic, and a test where appropriate.

          If failure_type is duplicate_or_grain_failure:
          - Add deterministic deduplication and a uniqueness/grain test.

          If failure_type is missing_required_value:
          - Add quarantine logic and not-null test. Do not fabricate business keys.

          If failure_type is invalid_business_metric:
          - Add diagnostics, tests, and quarantine. Do not redefine metrics.

          If failure_type is unknown_failure:
          - Create only a diagnostic note under docs/recovery/.

          Do not auto-merge.
          Do not disable tests.
          Do not change secrets.
          Do not print secrets.
          Do not touch unrelated files.
          "

      - name: Show generated diff
        run: |
          git status
          git diff

      - name: Create pull request with Codex fix
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "fix: codex recovery patch for failed workflow"
          branch: codex/auto-fix-${{ github.run_id }}
          base: main
          title: "[AI-DRAFT] Codex recovery patch for failed Databricks workflow"
          body: |
            Codex generated this draft PR after a failed workflow.

            Failed workflow:
            ${{ env.FAILED_RUN_URL }}

            Files used:
            - AGENTS.md
            - skills/approvalmax-semi-self-recovery/SKILL.md
            - recovery/failed_workflow.log
            - recovery/failure_context.json

            Human review checklist:
            - [ ] Patch is minimal
            - [ ] No tests were disabled
            - [ ] No secrets were changed
            - [ ] No secrets were printed
            - [ ] No unrelated files were touched
            - [ ] Databricks bundle validation passes
            - [ ] The failed workflow passes after merge
          labels: |
            ai-draft
            data-recovery
