name: Run ApprovalMax Great Expectations

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - Run ApprovalMax CDC Automation
    types:
      - completed

permissions:
  contents: read

jobs:
  run-great-expectations:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Check Databricks auth
        run: |
          databricks current-user me

      - name: Validate bundle
        run: |
          databricks bundle validate -t dev

      - name: Deploy bundle
        run: |
          databricks bundle deploy -t dev

      - name: Run Great Expectations validation
        run: |
          databricks bundle run approvalmax_great_expectations_serverless -t dev
