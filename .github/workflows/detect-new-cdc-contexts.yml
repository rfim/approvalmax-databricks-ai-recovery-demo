name: Detect New CDC Contexts

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "sample_data/approvalmax_cdc/**"
      - "metadata/supported_cdc_contexts.yml"
      - "scripts/detect_new_cdc_contexts.py"
      - ".github/workflows/detect-new-cdc-contexts.yml"

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  detect-new-cdc-contexts:
    runs-on: ubuntu-latest

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Detect new CDC contexts
        id: detect
        continue-on-error: true
        run: |
          python scripts/detect_new_cdc_contexts.py
          exit_code=$?
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"

          if [ "$exit_code" = "10" ]; then
            echo "has_new_contexts=true" >> "$GITHUB_OUTPUT"
            exit 0
          elif [ "$exit_code" = "0" ]; then
            echo "has_new_contexts=false" >> "$GITHUB_OUTPUT"
            exit 0
          else
            echo "Detector failed with exit code $exit_code"
            exit "$exit_code"
          fi

      - name: Show detection output
        run: |
          cat recovery/new_cdc_contexts.json

      - name: Stop if no new contexts
        if: steps.detect.outputs.has_new_contexts != 'true'
        run: |
          echo "No new CDC contexts detected. Normal CDC/dbt/GE workflows can proceed."

      - name: Install Node.js
        if: steps.detect.outputs.has_new_contexts == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Codex CLI
        if: steps.detect.outputs.has_new_contexts == 'true'
        run: |
          npm install -g @openai/codex
          codex --version

      - name: Restore Codex auth.json
        if: steps.detect.outputs.has_new_contexts == 'true'
        run: |
          mkdir -p "$HOME/.codex"
          printf '%s' "$CODEX_AUTH_JSON" > "$HOME/.codex/auth.json"
          chmod 600 "$HOME/.codex/auth.json"
          cat > "$HOME/.codex/config.toml" <<'EOF'
          cli_auth_credentials_store = "file"
          EOF

      - name: Ask Codex to draft modelling changes
        if: steps.detect.outputs.has_new_contexts == 'true'
        continue-on-error: true
        run: |
          codex exec --sandbox workspace-write "
          Follow AGENTS.md strictly if present.

          You are in an ApprovalMax-style Databricks data platform repo.

          Read:
          - recovery/new_cdc_contexts.json
          - metadata/supported_cdc_contexts.yml
          - src/approvalmax_cdc_automation_notebook.ipynb
          - models/
          - .github/workflows/

          Task:
          For each new CDC context in recovery/new_cdc_contexts.json, create a draft PR-ready change.

          Required changes:
          - Update metadata/supported_cdc_contexts.yml with the new context.
          - Add or update documentation under docs/recovery/new_cdc_contexts.md.
          - If safe and obvious, add Silver parsing and Gold dimension logic to src/approvalmax_cdc_automation_notebook.ipynb.
          - If dbt is present, add a dbt source/model/test for the new context where safe.
          - Do not change existing financial metrics.
          - Do not invent business keys without marking them as candidate/human review required.
          - Do not disable tests or quality checks.
          - Keep the change minimal and reviewable.

          Important:
          If you are not confident about the model grain or business key, update only metadata and documentation, and clearly mark human review required.
          "

      - name: Deterministic fallback if Codex made no useful change
        if: steps.detect.outputs.has_new_contexts == 'true'
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          import subprocess
          import yaml

          changed = subprocess.run(
              ["git", "diff", "--name-only"],
              capture_output=True,
              text=True,
              check=True
          ).stdout.strip().splitlines()

          meaningful = [f for f in changed if not f.startswith("recovery/")]
          if meaningful:
              print("Codex already produced meaningful changes:", meaningful)
              raise SystemExit(0)

          detection = json.loads(Path("recovery/new_cdc_contexts.json").read_text())

          registry_path = Path("metadata/supported_cdc_contexts.yml")
          registry = yaml.safe_load(registry_path.read_text()) if registry_path.exists() else {"supported_contexts": {}}
          registry.setdefault("supported_contexts", {})

          for context in detection.get("new_contexts", []):
              inferred = detection["inferred"].get(context, {})
              business_key = inferred.get("candidate_business_key") or f"{context}_id"
              registry["supported_contexts"][context] = {
                  "business_key": business_key,
                  "silver_table": inferred.get("candidate_silver_table", f"{context}_current"),
                  "gold_tables": inferred.get("candidate_gold_tables", [f"dim_{context}"]),
                  "human_review_required": True,
                  "status": "candidate_detected_from_cdc",
              }

          registry_path.parent.mkdir(parents=True, exist_ok=True)
          registry_path.write_text(yaml.safe_dump(registry, sort_keys=False), encoding="utf-8")

          Path("docs/recovery").mkdir(parents=True, exist_ok=True)
          doc = Path("docs/recovery/new_cdc_contexts.md")
          doc.write_text(
              "# New CDC Contexts Detected\n\n"
              "The detector found new CDC source_table values that are not yet fully modelled.\n\n"
              "```json\n"
              + json.dumps(detection.get("new_contexts", []), indent=2)
              + "\n```\n\n"
              "## Required human review\n\n"
              "- Confirm business key and grain for each new context.\n"
              "- Decide whether the context should become a Silver table, Gold dimension, Gold fact, or remain Bronze-only.\n"
              "- Add tests and Great Expectations checks before production use.\n\n",
              encoding="utf-8"
          )

          print("Fallback updated metadata/supported_cdc_contexts.yml and docs/recovery/new_cdc_contexts.md")
          PY

      - name: Show generated diff
        if: steps.detect.outputs.has_new_contexts == 'true'
        run: |
          git status
          git diff

      - name: Create PR for new CDC context modelling
        if: steps.detect.outputs.has_new_contexts == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: add candidate modelling for new CDC contexts"
          branch: codex/new-cdc-contexts-${{ github.run_id }}
          base: main
          title: "[AI-DRAFT] Add candidate modelling for new CDC contexts"
          body: |
            This PR was created automatically after new CDC source_table contexts were detected.

            Please review carefully before merging.

            Files to review:
            - `recovery/new_cdc_contexts.json`
            - `metadata/supported_cdc_contexts.yml`
            - `docs/recovery/new_cdc_contexts.md`
            - any generated notebook/dbt model changes

            Human review checklist:
            - [ ] Business key is correct
            - [ ] Grain is correct
            - [ ] New context should be promoted beyond Bronze
            - [ ] No financial metric definitions were changed
            - [ ] Tests/quality checks are sufficient
            - [ ] CDC/dbt/GE workflows pass after merge
          labels: |
            ai-draft
            new-cdc-context
            data-modeling
